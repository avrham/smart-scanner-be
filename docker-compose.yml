
services:
  api:
    build: .
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    env_file: .env
    ports:
      - "8000:8000"
    volumes:
      # Mount source code for development (hot reload)
      - .:/app
      - /app/__pycache__  # Exclude pycache from volume
    environment:
      - PYTHONPATH=/app
      - ENVIRONMENT=development
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  scheduler:
    image: curlimages/curl:8.8.0
    env_file: .env
    depends_on:
      api:
        condition: service_healthy
    command: >
      /bin/sh -c "
      echo 'Smart Scanner Scheduler started - monitoring at hours 10, 14, 18 UTC';
      while true; do
        HH=$$(date -u +%H);
        MM=$$(date -u +%M);
        echo \"Current time: $$(date -u) (Hour: $$HH, Minute: $$MM)\";
        
        if [ \"$$HH\" = \"10\" ] || [ \"$$HH\" = \"14\" ] || [ \"$$HH\" = \"18\" ]; then
          if [ \"$$MM\" = \"00\" ]; then
            echo \"Triggering scan at hour $$HH\";
            curl -s -X POST -H \"X-Worker-Token: $${WORKER_TOKEN}\" http://api:8000/api/admin/scan/start;
            echo \"Scan triggered, sleeping for 1 hour 5 minutes to avoid duplicate triggers\";
            sleep 3905;
          else
            echo \"Waiting for minute 00 (currently $$MM)\";
            sleep 60;
          fi
        else
          echo \"Outside scan hours, checking again in 5 minutes\";
          sleep 300;
        fi
      done"
    restart: unless-stopped

