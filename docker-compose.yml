
# Scheduling (B6): the in-process APScheduler inside the API service is the
# single authoritative scheduler. It is controlled by the ENABLE_SCHEDULER env
# var (default true) and runs scans at SCAN_TIMES. The previous external
# `scheduler` curl-loop service was removed because it ran scans in parallel
# with APScheduler, causing duplicate runs. Do NOT reintroduce an external
# trigger without first setting ENABLE_SCHEDULER=false.
services:
  api:
    build: .
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    env_file: .env
    ports:
      - "8000:8000"
    volumes:
      # Mount source code for development (hot reload)
      - .:/app
      - /app/__pycache__  # Exclude pycache from volume
    environment:
      - PYTHONPATH=/app
      - ENVIRONMENT=development
      # ENABLE_SCHEDULER controls the single authoritative in-process scheduler.
      - ENABLE_SCHEDULER=true
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped

